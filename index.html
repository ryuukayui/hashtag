<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Hashtag Reveal</title>



<style>

body {

  margin: 0;

  height: 100vh;

  display: flex;

  justify-content: center;

  align-items: center;

  background: white;

  font-family: Helvetica, Arial, sans-serif;

  cursor: pointer;

}



#tag {

  font-size: 2.5rem;

  opacity: 0;

  transition: opacity 0.6s ease;

}

</style>

</head>



<body>



<div id="tag"></div>



<script>

const tags = [



"#deinfluencing", "#trendsandtragedies", "#uglycool", "#anticleangirl",

"#gatekeeping", "#maximalism", "#styleovertrends", "#unpopularopinion",

"#microtrends", "#fashioncrimes",



"#maincharacterenergy", "#nepobabyvibe", "#delusional", "#pickme",

"#itgirlstatus", "#notyouraverage", "#overdressed", "#tryingtoohard",

"#niche", "#gatekeep",



"#instagramvsreality", "#unfiltered", "#cancelculture", "#cringe",

"#clout", "#loweffort", "#ratgirlsummer", "#honestreview",

"#staged", "#offduty",



"#loudluxury", "#postaesthetic", "#digitaldetox", "#aislop",

"#corecore", "#recessioncore", "#overconsumption", "#weirdgirl",

"#subversivebasics", "#antihero",



"#burnit", "#keepit", "#hotmess", "#controversial",

"#debate", "#chooseyourcharacter", "#trendwatch",

"#rateit", "#dontbuythis", "#villainera"



];



function showRandomTag() {

  const tagElement = document.getElementById("tag");

  tagElement.style.opacity = 0;



  setTimeout(() => {

    const randomTag = tags[Math.floor(Math.random() * tags.length)];

    tagElement.innerText = randomTag;

    tagElement.style.opacity = 1;

  }, 200);

}



// 初始加载

showRandomTag();



// 点击刷新

document.body.addEventListener("click", showRandomTag);

</script>



</body>

</html>
